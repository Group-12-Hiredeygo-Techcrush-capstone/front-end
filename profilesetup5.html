<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Complete - HiredeyGo</title>
    <link rel="stylesheet" href="/css/profile.css">
    <script src="/js/profilesetup.js" defer></script>
</head>

<body>

<header class="main-header">
    <div class="header-content">
        <div class="logoframe">
            <img src="/images/logo.png" alt="HiredeyGo Logo" width="50">
            <h1 class="logo-writeup">
                Hire<span class="logo-span">dey</span>Go
            </h1>
        </div>

        <div class="process-frame">
            <div class="progress-top">
                <p class="process">Setup Progress</p>
                <p class="percent">100% Completed</p>
            </div>
            <div class="progress-bar">
                <div class="progress-fill-100"></div>
            </div>
        </div>
    </div>
</header>


<section class="success-section">
    <div class="success-container">
        
        <div class="success-icon">
            ✔
        </div>

        <h1 class="success-title">🎉 Congratulations!</h1>
        <p class="success-text">
            Your profile and company information are now complete. You are all set to start finding the best talent for your team.
        </p>

        <div class="success-buttons">
            <button type="button" class="dashboard-btn" onclick="location.href='recruitersdashboard.html'">
                View Dashboard
            </button>

            <button type="button" class="post-btn" onclick="location.href='post-job.html'">
                Post a Job →
            </button>
        </div>

    </div>
</section>

</body>
</html>
