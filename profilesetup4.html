<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup 4 - Contact</title>
    <link rel="stylesheet" href="css/profile.css">
    <script src="/js/profilesetup.js" defer></script>
</head>

<body>

<header class="main-header">
    <div class="header-content">
        <div class="logoframe">
            <img src="images/logo.png" alt="HiredeyGo Logo" width="50">
            <h1 class="logo-writeup">
                Hire<span class="logo-span">dey</span>Go
            </h1>
        </div>

        <div class="process-frame">
            <div class="progress-top">
                <p class="process">Setup Progress</p>
                <p class="percent">80%</p> 
            </div>
            <div class="progress-bar">
                <div class="progress-fill-100" style="width: 80%;"></div>
            </div>
        </div>
    </div>

    <nav class="navbox">
        <div class="navbar">
            <div class="nav1">
                <img src="images/cominfo.svg" alt="Icon">
                <p>Company Info</p>
            </div>
            <div class="nav2">
                <img src="images/foundinginfo.svg" alt="Icon">
                <p>Founding Info</p>
            </div>
            <div class="nav3">
                <img src="images/socialmedia.svg" alt="Icon">
                <p>Social Media</p>
            </div>
            <div class="nav4-active">
                <img src="images/contact.svg" alt="Icon">
                <p>Contact</p>
            </div>
        </div>
    </nav>
</header>

<section class="contact-section">
    <div class="contact-container">
        
        <label for="mapLocation">Map Location (Headquarters)</label>
        <input type="text" id="mapLocation" placeholder="Enter physical address or Google Maps link">

        <label for="contactPhone">Phone Number</label>
        <div class="phone-input">
            <div class="country-code">
                <img src="images/nigeriaflag.svg" alt="NG" width="20">
                <span>+234</span>
            </div>
            <input type="tel" id="contactPhone" placeholder="812 345 6789">
        </div>

        <label for="contactEmail">Official Contact Email</label>
        <div class="email-input">
            <img src="images/email.svg" alt="Email Icon" width="18">
            <input type="email" id="contactEmail" placeholder="hr@company.com">
        </div>

        <div class="buttons">
            <button type="button" class="previous">← Previous</button>
            <button type="button" class="finish">Finish Setup →</button>
        </div>
    </div>
</section>

</body>
</html>
