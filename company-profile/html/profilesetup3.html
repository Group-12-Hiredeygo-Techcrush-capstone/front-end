<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Setup - Social Media</title>
<link rel="stylesheet" href="/company-profile/css/profile.css">
</head>

<body>

<!-- HEADER -->
<header class="main-header">

<div class="header-content">

<div class="logoframe">
<img src="/company-profile/images/logo.png" alt="HiredeyGo Logo">

<h1 class="logo-writeup">
Hire<span class="logo-span">dey</span>Go
</h1>
</div>

<div class="process-frame">

<div class="progress-top">
<span>Setup Progress</span>
<span class="percent">50% Completed</span>
</div>

<div class="progress-bar">
<div class="progress-fill-50 social-progress"></div>
</div>

</div>

</div>

<!-- NAVBAR -->
<nav class="navbox">

<div class="navbar">

<div class="nav1">
<img src="/company-profile/images/nav/cominfo.svg" alt="Company Info Icon">
<p>Company Info</p>
</div>

<div class="nav2">
<img src="/company-profile/images/nav/foundinginfo.svg" alt="Founding Info Icon">
<p>Founding Info</p>
</div>

<div class="nav3-active">
<img src="/company-profile/images/nav/socialmedia.svg" alt="Social Media Icon">
<p>Social Media Profile</p>
</div>

<div class="nav4">
<img src="/company-profile/images/nav/contact.svg" alt="Contact Icon">
<p>Contact</p>
</div>

</div>

</nav>

</header>


<!-- SOCIAL MEDIA FORM -->
<section class="social-section">

<div class="social-container">

<div class="social-item">

<label>Social Link 1</label>

<div class="social-input">

<div class="platform">
<img src="/company-profile/images/social/facebook.svg">
<span>Facebook</span>
<span><img src="/company-profile/images/social/arrowdown.svg" alt=""></span>
</div>

<input type="text" placeholder="Profile link/url...">

<button class="remove">✖</button>

</div>

</div>


<div class="social-item">

<label>Social Link 2</label>

<div class="social-input">

<div class="platform">
<img src="/company-profile/images/social/twitter.svg">
<span>Twitter</span>
<span><img src="/company-profile/images/social/arrowdown.svg" alt=""></span>
</div>

<input type="text" placeholder="Profile link/url...">

<button class="remove">✖</button>

</div>

</div>


<div class="social-item">

<label>Social Link 3</label>

<div class="social-input">

<div class="platform">
<img src="/company-profile/images/social/instagram.svg">
<span>Instagram</span>
<span><img src="/company-profile/images/social/arrowdown.svg" alt=""></span>
</div>

<input type="text" placeholder="Profile link/url...">

<button class="remove">✖</button>

</div>

</div>


<div class="social-item">

<label>Social Link 4</label>

<div class="social-input">

<div class="platform">
<img src="/company-profile/images/social/youtube.svg">
<span>Youtube</span>
<span><img src="/company-profile/images/social/arrowdown.svg" alt=""></span>
</div>

<input type="text" placeholder="Profile link/url...">

<button class="remove">✖</button>

</div>

</div>


<button class="add-social">
＋ Add New Social Link
</button>


<div class="social-buttons">

<button class="previous">Previous</button>

<button class="save">
Save & Continue →
</button>

</div>

</div>

</section>

</body>
</html>
