<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set New Password</title>
  <link rel="stylesheet" href="css/setpassword.css" />
  <script src="js/setpassword.js" defer></script>
</head>

<body>

  <div class="container">

    <div class="card">
      <h1>Set a New Password</h1>
      <p class="subtitle">
        Your new password must be different from previous passwords.
      </p>

      <form id="resetForm">

        <!-- New Password -->
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="password" placeholder="Enter at least 8 characters" required />
          <small id="strengthText">Password strength</small>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat your new password" required />
        </div>

        <!-- Error Message -->
        <p id="errorMsg" class="error"></p>

        <!-- Button -->
        <button type="submit" class="btn">Update Password</button>

      </form>

    </div>

  </div>

  <script src="reset.js"></script>
</body>
</html>
