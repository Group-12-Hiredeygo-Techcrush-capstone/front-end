<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>email verification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/emailverification.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="js/emailverification.js" defer></script>
    <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="images/hiredeygologo.png" alt="">
        </div>
        <div class="verification-icon">
            <img src="images/Container.png" alt="">
        </div>
        <div class="question-tag">
            <img src="images/Frame 41.png" alt="">
        </div>
    </header>
    <!--The overall container of the email verification goes in here-->
    <section class="container">
        <!--The conatiner for the email image-->
        <div class="container1">
            <div class="container-box1">
                <i class="bx bx-envelope"></i>
            </div>
        </div>
        <!--conatiner for the input verification code-->
        <div class="container2">
            <h1>Check your Inbox</h1>
            <p>We've sent 6-digit verification code to 
            <P><span>hello@example.com</span></p>
            <p>Please enter it below to verify your account</p>
            <div class="otp-inputs">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
                <input type="text" maxlength="1">
            </div>
            <button class="verify-btn">Verify email</button>
            <div class="box">
                <p class="resend">Didn't receive the code? </p>
                <p><a href="#">Resend verification link</a> </p>
                <p>Use a different email Address</p>
            </div>
        </div>
    </section>
</body>
</html>
