<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Setup 1</title>
<link rel="stylesheet" href="/css/profile.css">
<script src="/js/profilesetup.js"defer></script>
</head>

<body>

<!-- Header -->
<header class="main-header">

<div class="header-content">

<div class="logoframe">
<img src="/images/logo.png" alt="HiredeyGo Logo">

<h1 class="logo-writeup">
Hire<span class="logo-span">dey</span>Go
</h1>
</div>

<div class="process-frame">
<div class="process">
<h4>Setup Progress</h4>
</div>
<div class="line"></div>
</div>

</div>

<!-- Navbar -->
<nav class="navbox">

<div class="navbar">

<div class="nav1-active">
<img src="/images/cominfo.svg" alt="Company Info Icon">
<p>Company Info</p>
</div>

<div class="nav2">
<img src="/images/foundinginfo.svg" alt="Founding Info Icon">
<p>Founding Info</p>
</div>

<div class="nav3">
<img src="/images/socialmedia.svg" alt="Social Media Icon">
<p>Social Media Profile</p>
</div>

<div class="nav4">
<img src="/images/contact.svg" alt="Contact Icon">
<p>Contact</p>
</div>

</div>

</nav>

</header>


<!-- Section -->
<section class="grid-container">

<!-- Left Section -->
<div class="left">

<h1>Set Up Your Company Profile</h1>
<p class="subtitle">This will help candidates find and trust your listings.</p>

<div class="logo-upload">

<div class="logo-box">
    <img src="/images/companylogo.png" alt="Company Logo">
</div>

<div class="logo-text">

<p class="label">Company Logo</p>
<p class="small">PNG, JPG Max 2MB</p>

<input type="file" id="logoInput" accept="image/*" hidden />
<button id="uploadBtn" class="upload-btn">Upload Logo</button>

<p id="fileName"></p>
<p id="errorMsg" style="color: red;"></p>

</div>

</div>


<label>Company Name</label>
<input type="text">

<label>Industry</label>
<select>
<option>Technology</option>
</select>

<label>Company Website</label>
<input type="text">

<label>Headquarters</label>
<input type="text">

</div>


<!-- Right Section -->
<div class="right">

<label>Company Size</label>
<select>
<option>11-50 employees</option>
</select>

<label>About Company</label>
<textarea placeholder="Write down about your company here. Let the candidate know about who we are..."></textarea>

<div class="file-upload">
<img src="/images/uploadlogo.png" alt="upload file">
<p>Upload your company CAC/Cert. of Incorporation</p>
<span>PDF, DOC, DOCX MAX 5MB</span>

<button class="browse">Browse File</button>

</div>

</div>

</section>


<!-- Footer Button -->
<div class="footer-btn">
<button class="save">Save & Continue →</button>
</div>

</body>
</html>
