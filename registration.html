<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Recruiter Account | HiredeyGo</title>
    <script src="js/registration.js" defer></script>
    <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">

    <link rel="stylesheet" href="css/registration.css">
</head>
<body>

<div class="container">

    <div class="left">
        <div class="overlay">
            <h1><br></h1>
            <p></p>

            <div class="stats">
                <div>
                    <h2></h2>
                    <span></span>
                </div>
                <div>
                    <h2></h2>
                    <span></span>
                </div>
            </div>
        </div>
    </div>

    <div class="right">
        <form id="registerForm">
            <h2>Create Recruiter Account</h2>
            <p class="sub">Start hiring smarter in minutes</p>

            <input type="text" id="companyName" placeholder="Company Name" required>
            <input type="text" id="companyAddress" placeholder="Company Address" required>
            <input type="email" id="email" placeholder="Work Email" required>

            <select id="companySize">
                <option value="1-10">1-10 employees</option>
                <option value="11-50">11-50 employees</option>
                <option value="51-200">51-200 employees</option>
                <option value="51-200">200+ employees</option>
            </select>

            <input type="password" id="password" placeholder="Password" required>

            <button type="submit" id="submitBtn">Create Account →</button>

            <p id="message"></p>

            <p class="login">
                Already have an account? <a href="login.html">Sign in</a>
            </p>
        </form>
    </div>

</div>

</body>
</html>
