<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup 2</title>
    <link rel="stylesheet" href="css/profile.css">
    <script src="/js/profilesetup.js" defer></script>
</head>

<body>

    <header class="main-header">
        <div class="header-content">
            <div class="logoframe">
                <img src="images/logo.png" alt="HiredeyGo Logo">
                <h1 class="logo-writeup">
                    Hire<span class="logo-span">dey</span>Go
                </h1>
            </div>

            <div class="process-frame">
                <div class="progress-top">
                    <span>Setup Progress</span>
                    <span class="percent">25% Completed</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill-25"></div>
                </div>
            </div>
        </div>

        <nav class="navbox">
            <div class="navbar">
                <div class="nav1">
                    <img src="images/cominfo.svg" alt="Company Info Icon">
                    <p>Company Info</p>
                </div>

                <div class="nav2-active">
                    <img src="images/foundinginfo.svg" alt="Founding Info Icon">
                    <p>Founding Info</p>
                </div>

                <div class="nav3">
                    <img src="images/socialmedia.svg" alt="Social Media Icon">
                    <p>Social Media Profile</p>
                </div>

                <div class="nav4">
                    <img src="images/contact.svg" alt="Contact Icon">
                    <p>Contact</p>
                </div>
            </div>
        </nav>
    </header>

    <section class="form-section">
        <div class="form-grid">

            <div class="form-group">
                <label>Organization Type</label>
                <select id="orgType">
                    <option value="" disabled selected>Select...</option>
                    <option value="Private">Private Company</option>
                    <option value="Public">Public Company</option>
                    <option value="Non-Profit">Non-Profit (NGO)</option>
                    <option value="Government">Government Agency</option>
                    <option value="Sole Proprietorship">Sole Proprietorship</option>
                </select>
            </div>

            <div class="form-group">
                <label>Industry Type</label>
                <select id="industryType">
                    <option value="" disabled selected>Select...</option>
                    <option value="Technology">Technology & Software</option>
                    <option value="Finance">Finance & Banking</option>
                    <option value="Healthcare">Healthcare</option>
                    <option value="Education">Education</option>
                    <option value="Manufacturing">Manufacturing</option>
                    <option value="Real Estate">Real Estate</option>
                    <option value="Logistics">Logistics & Supply Chain</option>
                </select>
            </div>

            <div class="form-group">
                <label>Team Size</label>
                <select id="teamSize">
                    <option value="" disabled selected>Select...</option>
                    <option value="1-10">1-10 Employees</option>
                    <option value="11-50">11-50 Employees</option>
                    <option value="51-200">51-200 Employees</option>
                    <option value="201-500">201-500 Employees</option>
                    <option value="500+">500+ Employees</option>
                </select>
            </div>

            <div class="form-group">
                <label>Year of Establishment</label>
                <input type="date" id="estDate">
            </div>

            <div class="form-group">
                <label>Company Website</label>
                <input type="text" id="compWebsite" placeholder="Website url...">
            </div>

        </div>

        <div class="about-section">
            <label>About Company</label>
            <textarea id="compVision" placeholder="Tell us about your company vision..."></textarea>
            <div class="editor-tools">
                <strong>B</strong> <em>I</em> <u>U</u> <s>S</s> | 🔗 | • • •
            </div>
        </div>

        <div class="buttons">
            <button class="previous">Previous</button>
            <button class="save">Save & Continue →</button>
        </div>
    </section>

</body>
</html>
