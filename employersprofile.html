<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employers Profile | HireDeyGo</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap">
    
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <link rel="stylesheet" href="/css/global-nav.css">
    <link rel="stylesheet" href="/css/employersprofile.css">

    <script src="/js/global-nav.js" defer></script>
    <script src="/js/employersprofile.js" defer></script>
</head>
    
<body>
    <main>
        <header class="header-container" id="global-header"></header>
        <div class="logo" id="global-logo-bar"></div>

        <section class="main-container">      
            <aside class="side-bar" id="global-sidebar"></aside>

            <div class="container2">
                <div class="inner-container">
                    <div class="employer-profile">
                        <!--Employer profile tag name -->
                        <div class="employer-box">
                            <h1><span class="username">Employers Profile</span></h1>
                            <p>Manage your company information and settings</p>
                        </div>
                        <!--The edit button on the right side of the employer profile container-->
                        <div class="edit-box">
                            <button class="edit-btn" id="editBtn"> <img src="images/lucide_edit.svg" alt="">Edit Profile</button>
                        </div>
                    </div>
                    <div class="card-banner">
                        <div class="card-image">

                        </div>
                        <div class="card-text">
                            <h1>TechCorps Solution</h1>
                            <h2>Technology & Software</h2>
                            <div class="bottom-card">
                                <div>📍 Lagos, Nigeria</div>
                                <div>👥 51–200 employees</div>
                                <div>📅 Founded 2015</div>
                                <div>🌐 TechCorpsolution.com</div>
                            </div>
                        </div>
                        
                    </div>
                </div>
            </div>
            </section>
    </main>
</body>
</html>
