<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Setup 2</title>
<link rel="stylesheet" href="profile.css">
</head>

<body>

<!-- HEADER -->
<header class="main-header">

<div class="header-content">

<div class="logoframe">
<img src="images/logo.png" alt="HiredeyGo Logo">

<h1 class="logo-writeup">
Hire<span class="logo-span">dey</span>Go
</h1>
</div>

<div class="process-frame">

<div class="progress-top">
<span>Setup Progress</span>
<span class="percent">25% Completed</span>
</div>

<div class="progress-bar">
<div class="progress-fill-25"></div>
</div>

</div>

</div>


<!-- NAVBAR -->
<nav class="navbox">

<div class="navbar">

<div class="nav1">
<img src="images/nav/cominfo.svg">
<p>Company Info</p>
</div>

<div class="nav2-active">
<img src="images/nav/foundinginfo.svg">
<p>Founding Info</p>
</div>

<div class="nav3">
<img src="images/nav/socialmedia.svg">
<p>Social Media Profile</p>
</div>

<div class="nav4">
<img src="images/nav/contact.svg">
<p>Contact</p>
</div>

</div>

</nav>

</header>


<!-- FORM SECTION -->
<section class="form-section">

<div class="form-grid">

<div class="form-group">
<label>Organization Type</label>
<select>
<option>Select...</option>
</select>
</div>

<div class="form-group">
<label>Industry Type</label>
<select>
<option>Select...</option>
</select>
</div>

<div class="form-group">
<label>Team Size</label>
<select>
<option>Select...</option>
</select>
</div>

<div class="form-group">
<label>Year of Establishment</label>
<input type="date">
</div>

<div class="form-group">
<label>Company Website</label>
<input type="text" placeholder="Website url...">
</div>

</div>


<div class="about-section">

<label>About Company</label>

<textarea placeholder="Tell us about your company version..."></textarea>

<div class="editor-tools">
B I U S | 🔗 | • • •
</div>

</div>


<div class="buttons">

<button class="previous">Previous</button>
<button class="save">Save & Continue →</button>

</div>

</section>

</body>
</html>
