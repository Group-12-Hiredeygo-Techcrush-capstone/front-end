<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgotten password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/forgottenpassword.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="/js/forgottenpassword.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="/images/hiredeygologo.png" alt="">
        </div>
    </header>
    <main class="forgottenpassword-container">
        <section class="security-container">
            <div class="security-guard-circle">
                <img src="/images/security guard icon.png" alt="">
            </div>
            <p>Security</p>
            <div class="security-guard-close">
                <img src="/images/close icon.png" alt="">
            </div>
        </section>
        <section class="security-key-container">
            <div class="security-key">
                <img src="/images/security key icon.png" alt="">
            </div>
            <div>
                <h1>Forgot password?</h1>
            </div>
            <div class="container-key">
                <p>No worries, it happens! Enter your email address</p>
                <p>below and we'll send you a link to reset your</p>
                <p>password.</p>
            </div>
        <section class="input-container">
            <div class="input-field">
                <label for="email"><h2>Email address</h1></label>
                <img src="/images/message icon.png" alt="security key">
                <input type="text" id="email" placeholder="Enter your email">
            </div>
            <button class="reset-btn">Send Reset Link</button>
            <button class="back-btn"><img src="/images/back-link.png" alt=""></button>
        </section>

    </main>

    
</body>
</html>
