<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Setup - Contact</title>
<link rel="stylesheet" href="profile.css">
</head>

<body>

<!-- HEADER -->
<header class="main-header">

<div class="header-content">

<div class="logoframe">
<img src="images/logo.png">

<h1 class="logo-writeup">
Hire<span class="logo-span">dey</span>Go
</h1>
</div>

<div class="process-frame">

<div class="progress-top">
<span>Setup Progress</span>
<span class="percent">75% Completed</span>
</div>

<div class="progress-bar">
<div class="progress-fill"></div>
</div>

</div>

</div>


<!-- NAVBAR -->
<nav class="navbox">

<div class="navbar">

<div class="nav1">
<img src="images/nav/cominfo.svg">
<p>Company Info</p>
</div>

<div class="nav2">
<img src="images/nav/foundinginfo.svg">
<p>Founding Info</p>
</div>

<div class="nav3">
<img src="images/nav/socialmedia.svg">
<p>Social Media Profile</p>
</div>

<div class="nav4-active">
<img src="images/nav/contact.svg">
<p>Contact</p>
</div>

</div>

</nav>

</header>



<!-- CONTACT FORM -->
<section class="contact-section">

<div class="contact-container">

<label>Map Location</label>
<input type="text">

<label>Phone Number</label>

<div class="phone-input">

<div class="country-code">
<img src="images\social\nigeriaflag.svg">
<span>+234</span>
</div>

<input type="text" placeholder="Profile number...">

</div>


<label>Email</label>

<div class="email-input">
<img src="images/social/email.svg">
<input type="email" placeholder="Email Address">
</div>


<div class="buttons">

<button class="previous">Previous</button>

<button class="finish">
Finish editing →
</button>

</div>

</div>

</section>

</body>
</html>
