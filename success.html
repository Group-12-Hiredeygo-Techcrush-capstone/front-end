<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Posted Successfully - HiredeyGo</title>
    <link rel="stylesheet" href="/css/success-page.css">
</head>
<body class="success-page">

    <header class="main-header">
        <div class="header-content">
            <div class="logoframe">
                <img src="/images/logo.png" alt="HiredeyGo Logo" width="50">
                <h1 class="logo-writeup">
                    Hire<span class="logo-span">dey</span>Go
                </h1>
            </div>
            <div class="process-frame">
                <div class="progress-top">
                    <p class="process">Post Progress</p>
                    <p class="percent">100% Completed</p>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill-100"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="success-screen">
        <div class="success-card">
            <div class="check-container">
                <div class="check-circle">
                    <span class="check-mark">L</span>
                </div>
            </div>

            <h1 class="success-title">Job Successfully Posted!</h1>
            <p class="success-subtitle">
                Your job listing for <strong>TECH CRUSH</strong> is now live and visible to top talent. What would you like to do next?
            </p>

            <div class="action-grid">
                <button class="primary-btn" onclick="location.href='post-job.html'">
                    Post More Jobs
                </button>
                <button class="secondary-btn" onclick="location.href='recruitersdashboard.html'">
                    Go to Dashboard →
                </button>
            </div>
        </div>
    </main>

</body>
</html>
