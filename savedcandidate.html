<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HireDeyGo | Saved Candidates</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="icon" href="images/Background.png">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <link rel="stylesheet" href="css/global-nav.css">
    <link rel="stylesheet" href="css/savedcandidate.css">

    <script src="js/global-nav.js" defer></script>
    <script src="js/savedcandidate.js" defer></script>
</head>
<body>
    <main>
        <header class="header-container" id="global-header"></header>
        <div class="logo" id="global-logo-bar"></div>

        <section class="main-container">      
            <aside class="side-bar" id="global-sidebar"></aside>

            <div class="container2">
                <div class="inner-container">
                    <div class="top-bar">
                        <input type="text" id="candidateSearch" placeholder="Search candidates..." />
                        <button class="filter-btn">Filters</button>
                        <select id="sortSelect">
                            <option>Newest</option>
                            <option>Oldest</option>
                        </select>
                    </div>

                    <div class="section-title">
                        <h1>UI/UX Designers</h1>
                        <p class="subtitle">Review and manage all candidate applications across your job posts</p>
                    </div>
                    <div id="uiux" class="grid"></div>

                    <div class="section-title" style="margin-top: 5rem;">
                        <h1>Mobile Developers</h1>
                    </div>
                    <div id="mobile" class="grid"></div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
